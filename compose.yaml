# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
version: '3.8'

services:
  # The Web Server Service
  web:
    build: .
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./resources:/app/resources
      - ./cache:/app/cache

  # The MySQL Database Service
  db:
    image: mysql:8.0
    environment:
      # These values match the credentials in your logger.py
      MYSQL_ROOT_PASSWORD: simplegh1023
      MYSQL_DATABASE: server_logs
    ports:
      - "3307:3306"
    volumes:
      # Mounts the initialization script to run on first startup
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persists the database data even if the container goes down
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: